<!DOCTYPE html>
<html lang="vi">

<head>

<meta charset="UTF-8">
<title>For Nhựt Băng ❤️</title>

<style>

body{
margin:0;
background:radial-gradient(circle,#120018,#000);
font-family:'Segoe UI';
text-align:center;
color:white;
overflow:hidden;
}

/* ánh sáng romantic */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#ff2e6a55,transparent 60%);
animation:lightMove 8s infinite alternate;
pointer-events:none;
}

@keyframes lightMove{
0%{opacity:.3; transform:scale(1);}
100%{opacity:.8; transform:scale(1.2);}
}

/* container */

.container{
position:relative;
z-index:2;
}

/* hoa */

.rose{
width:460px;
max-width:90%;
height:auto;
image-rendering:auto;
}

@keyframes roseIntro{

0%{
transform:scale(.3);
opacity:0;
filter:blur(20px);
}

60%{
transform:scale(1);
opacity:1;
filter:blur(0);
}

85%{
opacity:1;
}

100%{
opacity:0;
transform:scale(1.1);
}

}
/* cánh hoa */

.petal{
position:absolute;
top:-50px;
font-size:26px;
animation:fall linear infinite;
pointer-events:none;
}

@keyframes fall{

0%{
transform:translateY(0) rotate(0);
opacity:1;
}

100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}

}

/* sparkle */

.sparkle{
position:absolute;
font-size:14px;
animation:twinkle 2s infinite;
pointer-events:none;
}

@keyframes twinkle{

0%{opacity:0}
50%{opacity:1}
100%{opacity:0}

}

/* nút */

#giftBtn{

display:none;
margin-top:40px;

font-size:26px;

background:linear-gradient(45deg,#ff004c,#ff6a8f);
border:none;

padding:18px 45px;

border-radius:50px;

color:white;

cursor:pointer;

box-shadow:0 0 35px #ff2d6f;

transition:.3s;

}

#giftBtn:hover{
transform:scale(1.12);
}

/* game */

#game{
display:none;
margin-top:40px;
}

.letters span{

display:inline-block;

background:white;

color:black;

font-size:30px;

margin:8px;

padding:12px 20px;

border-radius:12px;

cursor:pointer;

box-shadow:0 0 12px pink;

transition:.25s;

}

.letters span:hover{
transform:scale(1.25);
}

#current{

margin:25px;

font-size:36px;

letter-spacing:10px;

color:#ffd1dc;

}

#result{

margin-top:20px;

font-size:30px;

color:#ff7aa5;

}

/* voucher */

#voucher{

display:none;

margin-top:40px;

animation:cardOpen 1.5s ease;

}

@keyframes cardOpen{

0%{
transform:rotateX(90deg) scale(.5);
opacity:0;
}

100%{
transform:rotateX(0) scale(1);
opacity:1;
}

}

#loveText{

font-size:42px;
margin-bottom:30px;
color:#ffd1dc;
text-shadow:0 0 20px #ff2e6a,0 0 40px #ff2e6a;
animation:loveGlow 2s infinite alternate;

}

@keyframes loveGlow{
0%{transform:scale(1);}
100%{transform:scale(1.05);}
}

#voucherImg{

width:650px;

border-radius:20px;

box-shadow:0 0 70px rgba(255,0,90,0.9);

}

</style>
</head>


<body>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_7c57b29b79.mp3">
</audio>

<div class="container">

<!-- HOA -->

<img class="rose"
src="https://drive.google.com/uc?export=download&id=1201Gjl5tzh_hw-A4NkWID5w4EVwF3jj1">


<!-- NÚT QUÀ -->

<br>

<button id="giftBtn">

💌 Nhận quà tại đây nè Nhựt Băng

</button>


<!-- GAME -->

<div id="game">

<h2>Sắp xếp chữ để tạo thành câu bí mật</h2>

<div id="current"></div>

<div class="letters" id="letters"></div>

<div id="result"></div>

</div>


<!-- VOUCHER -->

<div id="voucher">

<h2 id="loveText">Anh cũng yêu bé ❤️</h2>

<img id="voucherImg"
src="https://lh3.googleusercontent.com/d/1O4MhiC9zSj4iDddMl3G-NHcDtaAZJUSM">
</div>

</div>


<script>

/* hiện nút sau 10s */

setTimeout(()=>{
document.querySelector(".rose").style.display="none"
document.getElementById("giftBtn").style.display="inline-block"
},10000)


/* mở game */

document.getElementById("giftBtn").onclick=function(){

document.getElementById("game").style.display="block"

}
setTimeout(()=>{
document.querySelector(".rose").style.display="none"
},10000)

/* cánh hoa */

for(let i=0;i<45;i++){

let petal=document.createElement("div")

petal.className="petal"

petal.innerHTML="🌸"

petal.style.left=Math.random()*100+"%"

petal.style.animationDuration=(4+Math.random()*6)+"s"

petal.style.fontSize=(18+Math.random()*16)+"px"

document.body.appendChild(petal)

}


/* sparkle */

for(let i=0;i<50;i++){

let s=document.createElement("div")

s.className="sparkle"

s.innerHTML="✨"

s.style.left=Math.random()*100+"%"

s.style.top=Math.random()*100+"%"

document.body.appendChild(s)

}


/* GAME */

let letters=["E","M","Y","Ê","U","A","N","H"]

letters.sort(()=>Math.random()-0.5)

let answer=""

let box=document.getElementById("letters")

letters.forEach(l=>{

let span=document.createElement("span")

span.innerText=l

span.onclick=function(){

answer+=l

document.getElementById("current").innerHTML=answer

span.style.visibility="hidden"

if(answer.length===8){

checkAnswer()

}

}

box.appendChild(span)

})


function checkAnswer(){

if(answer==="EMYÊUANH"){

document.getElementById("result").innerHTML=""   // xoá dòng ở game
document.getElementById("letters").style.display="none"

setTimeout(()=>{

document.getElementById("voucher").style.display="block"

},1200)

}

else{

document.getElementById("result").innerHTML="❌ Thử lại đi bé"

answer=""

document.getElementById("current").innerHTML=""

document.querySelectorAll(".letters span").forEach(s=>{
s.style.visibility="visible"
})

}


}

</script>

</body>
</html>
